# git-cliff configuration for Firmament
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{%- macro remote_url() -%}
  https://github.com/mrbandler/firmament
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}:** {{ commit.message | upper_first }}
  {%- if commit.breaking %} [**BREAKING**]{% endif %}
  {%- if commit.body %}\n  {{ commit.body | indent(width=2) }}{% endif %}
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message | upper_first }}
  {%- if commit.breaking %} [**BREAKING**]{% endif %}
  {%- if commit.body %}\n  {{ commit.body | indent(width=2) }}{% endif %}
{%- endif -%}
{%- endfor -%}
{% endfor %}
"""

# Template for the changelog footer
footer = """
{% for release in releases -%}
    {% if release.version -%}
        {% if release.previous.version -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
    https://github.com/mrbandler/firmament/compare/{{ release.previous.version }}...{{ release.version }}
        {% else -%}
[{{ release.version | trim_start_matches(pat="v") }}]: \
    https://github.com/mrbandler/firmament/releases/tag/{{ release.version }}
        {% endif -%}
    {% else -%}
{% if release.previous.version -%}
[Unreleased]: https://github.com/mrbandler/firmament/compare/{{ release.previous.version }}...HEAD
{% else -%}
[Unreleased]: https://github.com/mrbandler/firmament/commits/HEAD
{% endif -%}
    {% endif -%}
{% endfor %}
"""

# Remove leading and trailing whitespace from the template
trim = true

# Postprocessors for cleanup
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/mrbandler/firmament" },
]

[git]
# Parse conventional commits
conventional_commits = true

# Filter out unconventional commits
filter_unconventional = true

# Process each line of a commit as an individual commit
split_commits = false

# Regex for preprocessing commit messages
commit_preprocessors = [
    # Remove issue numbers from commits
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# Regex for parsing commits
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^doc", group = "<!-- 3 -->Documentation" },
    { message = "^style", group = "<!-- 4 -->Styling" },
    { message = "^refactor", group = "<!-- 5 -->Refactoring" },
    { message = "^test", group = "<!-- 6 -->Testing" },
    { message = "^build", group = "<!-- 7 -->Build System" },
    { message = "^ci", group = "<!-- 8 -->CI/CD" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore", group = "<!-- 9 -->Miscellaneous" },
    { message = "^revert", group = "<!-- 10 -->Reverts" },
]

# Protect breaking changes from being skipped
protect_breaking_commits = true

# Filter out commits by pattern
filter_commits = false

# Glob pattern for matching git tags
tag_pattern = "v[0-9].*"

# Regex for skipping tags
skip_tags = ""

# Regex for ignoring tags
ignore_tags = ""

# Sort commits by date
sort_commits = "oldest"
