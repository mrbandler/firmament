name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please fill out the sections below.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for this feature.
      options:
        - label: I have searched the existing issues
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Firmament does this feature relate to?
      options:
        - Runtime / Executor
        - Virtual MCU
        - Firmware Library (firmament-fm)
        - Peripherals
        - Documentation
        - Examples
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: |
        A clear and concise description of what the problem is.
        Example: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: |
        A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: |
        What other approaches have you thought about?

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: |
        If applicable, provide examples of how this feature would be used.
        Code snippets, API sketches, or diagrams are all helpful.
      placeholder: |
        ```rust
        // Example usage
        let mcu = Mcu::builder()
            .with_peripheral(Watchdog::new(timeout))
            .build();
        ```

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request here.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to contribute this feature?
      options:
        - label: I would be willing to submit a PR for this feature
